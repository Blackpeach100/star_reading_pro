<script>
/* --- global error guard (v70) --- */
(function(){
  function _srToast(msg){
    try{
      var box=document.getElementById('sr_toast_box');
      if(!box){
        box=document.createElement('div');
        box.id='sr_toast_box';
        box.style.cssText='position:fixed;left:12px;right:12px;bottom:16px;z-index:9999;pointer-events:none;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;';
        document.addEventListener('DOMContentLoaded',function(){ document.body.appendChild(box); },{once:true});
      }
      var t=document.createElement('div');
      t.textContent=msg;
      t.style.cssText='margin-top:8px;padding:10px 12px;border-radius:12px;background:rgba(140,30,30,0.92);color:#fff;font-size:13px;line-height:1.3;box-shadow:0 10px 24px rgba(0,0,0,0.35);';
      box.appendChild(t);
      setTimeout(function(){ try{ t.remove(); }catch(e){} }, 5500);
    }catch(e){}
  }
  window.__srToast=_srToast;
  window.addEventListener('error', function(ev){
    _srToast('スクリプトエラー: ' + (ev.message||'unknown'));
    try{ console.error(ev.error||ev.message); }catch(e){}
    ev.preventDefault && ev.preventDefault();
    return true;
  });
  window.addEventListener('unhandledrejection', function(ev){
    var msg = (ev.reason && (ev.reason.message||String(ev.reason))) || 'unknown';
    _srToast('処理エラー: ' + msg);
    try{ console.error(ev.reason); }catch(e){}
    ev.preventDefault && ev.preventDefault();
    return true;
  });
})();

	/* --- Interaction safety (iOS/iPad/HTML viewer) ---
	   Some WebView/HTML-reader apps can become "unclickable" if an SVG or
	   absolute element sits above controls. Force form controls to be on top
	   and disable pointer events on decorative SVGs. */
	.hdr,.wrap,#form-area,#res{position:relative}
	#form-area{z-index:10}
	#res{z-index:1}
	button,input,select,textarea,label{pointer-events:auto;touch-action:manipulation}
	/* All SVGs in this document are visual only */
	svg{pointer-events:none}
	/* But keep pointer events for buttons/links embedded inside SVG (if any future) */
	svg button,svg a{pointer-events:auto}

.y100TableWrap{max-height:340px;overflow:auto;border:1px solid rgba(255,255,255,0.08);border-radius:10px;background:rgba(255,255,255,0.02)}
.y100Table{width:100%;border-collapse:collapse;font-size:10px;min-width:520px}
.y100Table th,.y100Table td{padding:6px 6px;border-bottom:1px solid rgba(255,255,255,0.06);text-align:right;white-space:nowrap}
.y100Table th:first-child,.y100Table td:first-child{text-align:center}
.y100Table th:nth-child(2),.y100Table td:nth-child(2){text-align:center}
.y100Table th:nth-child(3),.y100Table td:nth-child(3){text-align:center}
.y100Table thead th{position:sticky;top:0;background:#141210;color:#d6d3d1;border-bottom:1px solid rgba(255,255,255,0.12);z-index:2}
.y100Table .wxh{font-weight:900}

/* highlight current year row */
.y100Table tr.current-year td{background:rgba(251,191,36,0.10);}
.y100Table tr.current-year td:first-child{position:sticky;left:0;background:rgba(251,191,36,0.14);z-index:1;}
.y100Table tr.current-year td:nth-child(2){background:rgba(251,191,36,0.12);}
.y100Table .curMark{display:inline-block;margin-right:4px;color:#fbbf24;font-weight:900}
/* highlight cells with value > 10 */
.y100Table td.high-val{background:rgba(74,222,128,0.12);box-shadow:0 0 0 1px rgba(74,222,128,0.18) inset;border-bottom-color:rgba(74,222,128,0.18)}


/* ===== Onmyoji tab UI ===== */
.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;border:1px solid rgba(255,255,255,0.10);background:rgba(255,255,255,0.03);color:#e7e5e4;font-size:12px}
.chip input{accent-color:#f59e0b}
.om-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px}
.om-col{padding:10px;border-radius:12px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02)}
.om-grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}
.om-five{margin-top:8px;border-radius:12px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);padding:10px}
.om-five-row{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:12px}
.om-five-row:last-child{border-bottom:none}
@media (max-width:720px){
  .om-grid{grid-template-columns:1fr}
  .om-grid2{grid-template-columns:1fr}
  .bz-grid-4{grid-template-columns:repeat(4,minmax(0,1fr)) !important;gap:6px !important;}
  .bz-grid-4 > div{padding:8px 6px !important;border-radius:10px !important;}
  .bz-grid-4 > div div:first-child{font-size:10px !important;}
  .bz-grid-4 > div div:nth-child(2){font-size:9px !important;}
  .bz-grid-4 > div div:nth-child(3){font-size:22px !important;margin-bottom:6px !important;}
  .bz-grid-4 > div div:nth-child(4){font-size:22px !important;}
}

function getSyukuName(year, month, day) {
  const key = String(year) + String(month);
  const tbl = SYUKU_DAILY[key];
  if (!tbl) return null;
  return tbl[day - 1] || null;
}

function getSyukuCompat(jibun, aite) {
  if (!jibun || !aite) return null;
  return (SYUKU_COMPAT[jibun] && SYUKU_COMPAT[jibun][aite]) || null;
}

let RP=null; // partner chart cache
function setPartner(){
  try{
    const yEl=document.getElementById('pY');
    const mEl=document.getElementById('pM');
    const dEl=document.getElementById('pD');
    const hEl=document.getElementById('pH');
    const gEl=document.getElementById('pG');
    if(!yEl||!mEl||!dEl||!hEl){return;}

    const y=+yEl.value, m=+mEl.value, d=+dEl.value;
    const hRaw = (hEl && hEl.value!=null) ? String(hEl.value) : "";
    const h = (hRaw==="unknown") ? null : (+hRaw);
    const pGender = (gEl && gEl.value) ? gEl.value : 'female';
    const isSH = !!(document.getElementById('pSH') && document.getElementById('pSH').checked);

    if(!y||!m||!d){window.__srToast && window.__srToast(String('相手の生年月日を入力してください')); console.error('相手の生年月日を入力してください');return;}

    // 日付クランプ（2/31 等の事故防止）
    const maxDay = new Date(y, m, 0).getDate();
    let dd = d;
    if(dd > maxDay){ dd = maxDay; dEl.value = String(dd); }
    if(dd < 1){ dd = 1; dEl.value = "1"; }

    const hh = (h===null) ? null : ((Number.isFinite(h) && h>=0 && h<=23) ? h : 12);

    // 時刻不明なら時柱を省略（節切り計算などの代表値として 12 時を使う）
    RP=cP(y,m,dd,hh,isSH);

    // keep for default UI selections
    RP._bY=y; RP._bM=m; RP._bD=dd; RP._bH=hh; RP._isSH=isSH;
    RP._bG=pGender;

    render();
  }catch(e){
    alert('相手情報の更新でエラー: '+(e&&e.message?e.message:e));
    logError(e);
  }
}
function clearPartner(){RP=null;render();}

// 天干の陰陽判定（"yin" / "yang" を返す）
// ※ iOS/Safari の「Can't find variable」対策：window に明示的に生やす
window.ganYinYang = window.ganYinYang || function(gan){
  try{
    const v = TG_YY[gan];
    if(v==="陰") return "yin";
    if(v==="陽") return "yang";
  }catch(_){ }
  // 予備：未知の値は陽扱い（比率は後で正規化される）
  return "yang";
};

function calcInyoWeighted(p){
  // 陰陽比率は「天干のみ」を重み付けして算出（年10 / 月15 / 日60 / 時5 = 合計90）。
  // 表示は必ず合計100%になるように正規化して返す。
  const W={year:10,month:15,day:60,hour:5};
  const items=[
    {g:p.yearG, w:W.year},
    {g:p.monthG, w:W.month},
    {g:p.dayG, w:W.day},
  ].concat(p.hourG ? [{g:p.hourG, w:W.hour}] : []);
  let yin=0, yang=0;
  for(const it of items){
    const yy = (window.ganYinYang ? window.ganYinYang(it.g) : "yang");
    if(yy==="yin") yin += it.w;
    else if(yy==="yang") yang += it.w;
  }
  const total = (yin+yang) || 1;
  const yinPct = Math.round((yin/total)*100);
  const yangPct = 100 - yinPct;
  return {yin, yang, yinPct, yangPct};
}

function tgS(g){return TG_YY[g]==="陽"?1:0.5;}
function dzS(dz,big,aG,aD){
  const s={"木":0,"火":0,"土":0,"金":0,"水":0};
  const hasAll = arr => arr.every(d=>aD.includes(d));
  const mC=aG.some(g=>g==="庚"||g==="辛")&&(hasAll(["申","子","辰"])||aD.includes("酉"));
  const eC=(aG.includes("戊")&&aG.includes("己"))||aD.some(d=>["戌","辰","巳"].includes(d));
  const jC=aG.some(g=>g==="甲"||g==="乙");
  const wC=jC&&(hasAll(["亥","子","丑"])||hasAll(["申","子","辰"])||aD.includes("卯"));
  const wCH=jC&&(hasAll(["巳","午","未"])||hasAll(["寅","午","戌"])||aD.includes("卯"));
  switch(dz){
    case "子": s["水"] += big ? 3.5 : 1.5; break;
    case "丑": s["土"] += big ? 1   : 0.5; s["金"] += big ? 1   : 0.5; s["水"] += big ? 2   : 1;   break;
    case "寅": s["火"] += big ? 1   : 0.5; s["木"] += big ? 2.5 : 1;   break;
    case "卯": s["木"] += big ? 3.5 : 1.5; break;
    case "辰": s["土"] += big ? 1.5 : 1;   s["木"] += big ? 1   : 0.5; s["水"] += big ? 1   : 0.5; break;
    case "巳": s["火"] += big ? 2.5 : 1;   if(mC){ s["土"] += big ? 2.5 : 1; s["金"] += big ? 1 : 0.5; } break;
    case "午": s["火"] += big ? 3.5 : 1.5; if(eC){ s["土"] += big ? 3.5 : 1.5; } break;
    case "未": s["火"] += big ? 1.5 : 0.5; s["土"] += big ? 1.5 : 1; if(wC){ s["木"] += big ? 1 : 0.5; } break;
    case "申": s["金"] += big ? 2.5 : 1;   s["水"] += big ? 1   : 0.5; break;
    case "酉": s["金"] += big ? 3.5 : 1.5; break;
    case "戌": s["火"] += big ? 1   : 0.5; s["土"] += big ? 2   : 1; if(mC){ s["金"] += big ? 1 : 0.5; } break;
    case "亥": if(wCH){ s["木"] += big ? 1 : 0.5; } s["水"] += big ? 2.5 : 1; break;
  }
  return s;
}
function applyGou(pre,aD){
  const W=["木","火","土","金","水"],has=d=>aD.includes(d),t={...pre};
  const cand=[]; // {wx,mult,label,rank}
  // 優先順位: 方合(3.5) > 三合(3) > 疑似三合(2) > 方合半会(1.7) > 三合半会(1.5)
  // 方合（局）
  if(has("寅")&&has("卯")&&has("辰")) cand.push({wx:"木",mult:3.5,label:"寅卯辰方合(木)×3.5",rank:5});
  if(has("巳")&&has("午")&&has("未")) cand.push({wx:"火",mult:3.5,label:"巳午未方合(火)×3.5",rank:5});
  if(has("申")&&has("酉")&&has("戌")) cand.push({wx:"金",mult:3.5,label:"申酉戌方合(金)×3.5",rank:5});
  if(has("亥")&&has("子")&&has("丑")) cand.push({wx:"水",mult:3.5,label:"亥子丑方合(水)×3.5",rank:5});

  // 三合
  if(has("亥")&&has("卯")&&has("未")) cand.push({wx:"木",mult:3,label:"亥卯未三合(木)×3",rank:4});
  if(has("寅")&&has("午")&&has("戌")) cand.push({wx:"火",mult:3,label:"寅午戌三合(火)×3",rank:4});
  if(has("巳")&&has("酉")&&has("丑")) cand.push({wx:"金",mult:3,label:"巳酉丑三合(金)×3",rank:4});
  if(has("申")&&has("子")&&has("辰")) cand.push({wx:"水",mult:3,label:"申子辰三合(水)×3",rank:4});

  // 疑似三合
  if(has("亥")&&has("寅")&&has("未")) cand.push({wx:"木",mult:2,label:"亥寅未疑似三合(木)×2",rank:3});
  if(has("寅")&&has("巳")&&has("戌")) cand.push({wx:"火",mult:2,label:"寅巳戌疑似三合(火)×2",rank:3});
  if(has("巳")&&has("申")&&has("丑")) cand.push({wx:"金",mult:2,label:"巳申丑疑似三合(金)×2",rank:3});
  if(has("申")&&has("亥")&&has("辰")) cand.push({wx:"水",mult:2,label:"申亥辰疑似三合(水)×2",rank:3});

  // 方合半会
  if(has("卯")&&has("寅")) cand.push({wx:"木",mult:1.7,label:"方合半会(木)×1.7",rank:2});
  if(has("午")&&(has("巳")||has("未"))) cand.push({wx:"火",mult:1.7,label:"方合半会(火)×1.7",rank:2});
  if(has("申")&&has("酉")) cand.push({wx:"金",mult:1.7,label:"方合半会(金)×1.7",rank:2});
  if(has("子")&&(has("亥")||has("丑"))) cand.push({wx:"水",mult:1.7,label:"方合半会(水)×1.7",rank:2});

  // 三合半会（※三合が成立していない場合のみ）
  const s3 = wx => (wx==="木"&&has("亥")&&has("卯")&&has("未")) ||
                  (wx==="火"&&has("寅")&&has("午")&&has("戌")) ||
                  (wx==="金"&&has("巳")&&has("酉")&&has("丑")) ||
                  (wx==="水"&&has("申")&&has("子")&&has("辰"));
  if(!s3("木")&&has("卯")&&(has("亥")||has("未"))) cand.push({wx:"木",mult:1.5,label:"三合半会(木)×1.5",rank:1});
  if(!s3("火")&&has("午")&&(has("寅")||has("戌"))) cand.push({wx:"火",mult:1.5,label:"三合半会(火)×1.5",rank:1});
  if(!s3("金")&&has("酉")&&(has("巳")||has("丑"))) cand.push({wx:"金",mult:1.5,label:"三合半会(金)×1.5",rank:1});
  if(!s3("水")&&has("子")&&has("申")) cand.push({wx:"水",mult:1.5,label:"三合半会(水)×1.5",rank:1});

  // 各五行について最大倍率をそれぞれ独立に適用
  const fi=[];
  W.forEach(wx=>{
    const wxCands=cand.filter(c=>c.wx===wx);
    if(!wxCands.length) return;
    wxCands.sort((a,b)=>{
      if(b.mult!==a.mult) return b.mult-a.mult;
      return b.rank-a.rank;
    });
    const best=wxCands[0];
    t[best.wx]*=best.mult;
    fi.push(best.label);
  });

  W.forEach(w=>{t[w]=Math.round(t[w]*100)/100;});
  return{total:t,fired:fi};
}
function calcScore(p,du,su,needMode="balance",daiunAge=null){
  const ng=p.day.g,W=["木","火","土","金","水"],mk=()=>({"木":0,"火":0,"土":0,"金":0,"水":0});

  const pillars=[p.year,p.month,p.day].concat(p.hour? [p.hour] : []);
  const aG=pillars.map(x=>x.g);
  const aD=pillars.map(x=>x.s);
  const duPhase = getDaiunPhase(du, daiunAge);
  if(duPhase){ if(duPhase.g) aG.push(duPhase.g); if(duPhase.s) aD.push(duPhase.s); }
  if(su){ aG.push(su.g); aD.push(su.s); } // 大運/流年

  const base=mk();
  pillars.forEach(pl=>{ if(pl && pl.g) base[TG_WX[pl.g]] += tgS(pl.g); });
  pillars.forEach((pl,i)=>{
    if(!pl || !pl.s) return;
    const isMonth = (i===1); // year,month,day,(hour)
    const sc=dzS(pl.s, isMonth, aG, aD);
    W.forEach(w=>{base[w]+=sc[w];});
  });

  const duS=mk();
  if(duPhase){
    if(duPhase.g) duS[TG_WX[duPhase.g]] += tgS(duPhase.g);
    if(duPhase.s){
      const sc=dzS(duPhase.s,true,aG,aD);
      W.forEach(w=>{duS[w]+=sc[w];});
    }
  }

  const suS=mk();
  if(su){
    suS[TG_WX[su.g]]+=tgS(su.g);
    const sc=dzS(su.s,false,aG,aD);W.forEach(w=>{suS[w]+=sc[w];});
  }

  const pre=mk();
  W.forEach(w=>{pre[w]=base[w]+duS[w]+suS[w];});
  const{total,fired}=applyGou(pre,aD);
  const gt=W.reduce((s,w)=>s+total[w],0);

  // 身強弱（目安）
  const nwx=TG_WX[ng], gM={"木":"水","火":"木","土":"火","金":"土","水":"金"};
  const sR=gt>0?(total[nwx]+total[gM[nwx]])/gt:0.5;
  let str;
  if(sR>0.6)str={t:"身旺",lv:3};
  else if(sR>0.5)str={t:"身旺",lv:2};
  else if(sR>0.4)str={t:"中和",lv:1};
  else if(sR>0.3)str={t:"身弱",lv:-1};
  else str={t:"身弱",lv:-2};

  // 通変星（五行→比劫,食傷,財星,官星,印星）
  const grpS={"比劫":0,"食傷":0,"財星":0,"官星":0,"印星":0};
  const _ord={"木":["木","火","土","金","水"],"火":["火","土","金","水","木"],"土":["土","金","水","木","火"],"金":["金","水","木","火","土"],"水":["水","木","火","土","金"]}[nwx]||W;
  const _g5=["比劫","食傷","財星","官星","印星"];
  const w2g={};_g5.forEach((g,i)=>{w2g[_ord[i]]=g;});
  W.forEach(w=>{if(w2g[w])grpS[w2g[w]]+=total[w];});
  const grpT=Object.values(grpS).reduce((a,b)=>a+b,0);
  const grpP={};Object.keys(grpS).forEach(k=>{grpP[k]=grpT>0?grpS[k]/grpT*100:20;});

  const so=Object.entries(grpP).sort((a,b)=>b[1]-a[1]);
  let pat=so[0][1]-so[so.length-1][1]<15?{t:"バランス型"}:{t:`${so[0][0]}突出型`};

  // 従来：弱い2つ（参考用）
  const weakG=Object.entries(grpP).sort((a,b)=>a[1]-b[1]).slice(0,2).map(e=>e[0]);

  // ---- 必要な氣（心の安定／成功一点集中） ----
  const need={mode:needMode, priGroup:null, secGroup:null, priWx:null, secWx:null, reason:""};
  const g2w={};Object.keys(w2g).forEach(w=>{g2w[w2g[w]]=w;});

  if(needMode==="success"){
    const pri=Object.entries(total).sort((a,b)=>b[1]-a[1])[0]?.[0]||_ord[0];
    need.priWx=pri;
    need.reason="成功重視：現状いちばん強い氣を一点集中で伸ばす";
  }else{
    const gNames=["印星","比劫","食傷","財星","官星"];
    const inS=grpS["印星"]||0, biS=grpS["比劫"]||0, shS=grpS["食傷"]||0, zaiS=grpS["財星"]||0, kanS=grpS["官星"]||0;
    const selfS=inS+biS;
    const otherS=shS+zaiS+kanS;
    const delta=1; // 1ステップの補強量（相対）
    const balanceScore=(scores)=>{
      const t=gNames.reduce((a,g)=>a+(scores[g]||0),0) || 1;
      const ps=gNames.map(g=>(scores[g]||0)/t);
      const m=ps.reduce((a,b)=>a+b,0)/ps.length;
      return ps.reduce((a,p)=>a+(p-m)*(p-m),0); // 分散
    };
    const simulate=(g1,g2)=>{
      const s={...grpS};
      if(g1) s[g1]=(s[g1]||0)+delta;
      if(g2) s[g2]=(s[g2]||0)+delta;
      const self=(s["印星"]||0)+(s["比劫"]||0);
      const other=(s["食傷"]||0)+(s["財星"]||0)+(s["官星"]||0);
      return {s,self,other,bal:balanceScore(s)};
    };

    // 基本：最も少ない氣→次に少ない氣
    const sorted=gNames.slice().sort((a,b)=>(grpS[a]||0)-(grpS[b]||0));
    let priG=sorted[0], secG=sorted[1];

    // 安定の理想：印星+比劫 > その他3気
    // すでに自己側が弱いなら、まず自己側（印星/比劫）を補強する
    if(selfS <= otherS){
      priG = (inS<=biS) ? "印星" : "比劫";
      secG = sorted.find(g=>g!==priG) || (priG==="印星" ? "比劫" : "印星");
    }

    // この組み合わせで {印星+比劫 > その他} を崩す可能性があるなら調整
    const sim0=simulate(priG,secG);
    const wouldBreak = (sim0.self <= sim0.other);

    if(wouldBreak){
      const minSelf = (inS<=biS) ? "印星" : "比劫";
      const otherGroups = ["食傷","財星","官星"].sort((a,b)=>(grpS[a]||0)-(grpS[b]||0));
      const cands=[];
      for(const og of otherGroups) cands.push([minSelf, og]);
      cands.push([minSelf, (minSelf==="印星" ? "比劫" : "印星")]);

      let best=null;
      for(const [a,b] of cands){
        const r=simulate(a,b);
        if(r.self <= r.other) continue;
        if(!best || r.bal < best.bal) best={a,b,bal:r.bal};
      }
      if(best){
        priG=best.a; secG=best.b;
        need.reason="安定重視：最小の氣を優先しつつ、{印星+比劫 > その他}を崩さない範囲で全体バランス最適化";
      }else{
        priG=minSelf; secG=null;
        need.reason="安定重視：条件維持を優先し、まず自己側（印星/比劫）を補強";
      }
    }else{
      need.reason="安定重視：最も少ない氣→次に少ない氣でバランスを整える";
    }

    need.priGroup=priG;
    need.secGroup=secG;
    need.priWx=g2w[priG]||_ord[0];
    need.secWx=secG ? (g2w[secG]||_ord[1]) : null;
  }

  // UI互換：必要氣の優先/補助をnGに入れる（成功モードは1つ）
  const nG=[need.priGroup, need.secGroup].filter(Boolean);

  return{base,du:duS,su:suS,pre,total,gt,str,sR,grpS,grpP,grpT,pat,nG,w2g,fired,weakG,need};
}

function _solveSekkiUTC(year, def){
  // Find UTC time when sunLon hits def.deg, around guess date (JST).
  // We'll search in a ±4日 window around the guess and bisection.
  const gM=def.guess[0], gD=def.guess[1];
  // JST guess at 12:00
  const guessUTC = new Date(Date.UTC(year, gM-1, gD, 3, 0, 0)); // JST 12:00 = UTC 03:00
  let lo = new Date(guessUTC.getTime() - 4*86400000);
  let hi = new Date(guessUTC.getTime() + 4*86400000);
  // Ensure bracketing by adjusting until sign changes
  const target=def.deg;
  let fLo=_angDiff(_sunLon(lo), target);
  let fHi=_angDiff(_sunLon(hi), target);
  let tries=0;
  while(fLo*fHi>0 && tries<6){
    lo = new Date(lo.getTime() - 2*86400000);
    hi = new Date(hi.getTime() + 2*86400000);
    fLo=_angDiff(_sunLon(lo), target);
    fHi=_angDiff(_sunLon(hi), target);
    tries++;
  }
  // If still not bracketed, just return guess (rare).
  if(fLo*fHi>0) return guessUTC;

  // Bisection to ~1 minute
  for(let i=0;i<60;i++){
    const mid = new Date((lo.getTime()+hi.getTime())/2);
    const fMid=_angDiff(_sunLon(mid), target);
    if(fLo*fMid<=0){ hi=mid; fHi=fMid; }
    else { lo=mid; fLo=fMid; }
    if(hi.getTime()-lo.getTime()<=60*1000) break;
  }
  return new Date((lo.getTime()+hi.getTime())/2);
}

function solarMonthNoBySekki(y,m,d,h,ignoreTime=false){
  // returns 1..12 where 1=寅月(立春〜啓蟄), ... 12=丑月(小寒〜立春)
  const dt=_dateUTCfromJST(y,m,d,h);
  const cur=getSekki(y), prev=getSekki(y-1), next=getSekki(y+1);

  const bounds=[
    {name:"大雪", dt: prev["大雪"], mo:11}, // 子月=11? We map later
    {name:"小寒", dt: cur["小寒"], mo:12},
    {name:"立春", dt: cur["立春"], mo:1},

    {name:"清明", dt: cur["清明"], mo:3},

    {name:"大雪2", dt: cur["大雪"], mo:11},
    {name:"小寒2", dt: next["小寒"], mo:12},
  ].sort((a,b)=>a.dt-b.dt);

  // Determine which segment dt is in: last boundary <= dt
  let curMo=bounds[0].mo;
  for(let i=0;i<bounds.length;i++){
    if(dt>=bounds[i].dt) curMo=bounds[i].mo;

  return curMo;

function calcAgeInfo(bY,bM,bD, y,m,d){
  try{

    const td = new Date(Date.UTC(y, (m||1)-1, (d||1), 12,0,0));
    const ms = td - bd;
    const days = ms / 86400000;
    const dec = Math.max(0, days / 365.2425);
    let years = y - bY;
    // 今年の誕生日をまだ迎えていない場合は -1
    const beforeBirthday = (m < bM) || (m===bM && d < bD);
    if(beforeBirthday) years -= 1;
    if(years < 0) years = 0;
    return {years, dec: dec.toFixed(1)};
  }catch(e){
    const years = Math.max(0,(y||0)-(bY||0));
    return {years, dec: String(years.toFixed?years.toFixed(1):years)};
  }
}

function cP(y,m,d,h,isSH,ignoreTime=false){
  // 時刻不明は「代表値=12時」で年/月/日の節切りだけ行い、時柱は省略する
  const hasHour = Number.isFinite(h);
  const hRep = hasHour ? h : 12;

  const birthUTC=_dateUTCfromJST(y,m,d,hRep);
  let lichun=lichunUTC(y);
  if(ignoreTime){ const jp=_jstPartsFromUTC(lichun); lichun=_dateUTCfromJST(jp.y,jp.m,jp.d,0); }
  const ly=(birthUTC < lichun) ? y-1 : y;
  const yi=((ly-4)%60+60)%60;

  let lm=solarMonthNoBySekki(y,m,d,hRep,ignoreTime); // 1..12 (寅=1)
  if(isSH){ lm = ((lm-1+6)%12)+1; } // 南半球補正：月柱を6か月ずらす
  const mi=([2,14,26,38,50][TG.indexOf(JZ60[yi][0])%5] + (lm-1))%60;

  const a=Math.floor((14-m)/12),yy=y+4800-a,mmm=m+12*a-3;
  const di=((d+Math.floor((153*mmm+2)/5)+365*yy+Math.floor(yy/4)-Math.floor(yy/100)+Math.floor(yy/400)-32045+49)%60+60)%60;

  let hourP = null;
  if(hasHour){
    let sc2=(h>=23||h<1)?0:Math.floor((h+1)/2);
    const hi=([0,12,24,36,48][TG.indexOf(JZ60[di][0])%5]+sc2)%60;
    const mk=i=>({gz:JZ60[i],g:JZ60[i][0],s:JZ60[i][1],i});
    hourP = mk(hi);
    return{year:mk(yi),month:mk(mi),day:mk(di),hour:hourP};
  }else{
    const mk=i=>({gz:JZ60[i],g:JZ60[i][0],s:JZ60[i][1],i});
    return{year:mk(yi),month:mk(mi),day:mk(di),hour:null};
  }
}
function calcDaiun(p,gen,bY,bM,bD,bH){
  // 立運（順行/逆行）ルール（年干基準）：
  // 年干が陽：男性=順行 / 女性=逆行
  // 年干が陰：男性=逆行 / 女性=順行
  const fw = (TG_YY[(p&&p.year?p.year.g:undefined)]==="陽" && gen==="male") || (TG_YY[(p&&p.year?p.year.g:undefined)]==="陰" && gen==="female");

  // A方式：出生日時 →（順行=次の節入り / 逆行=前の節入り）までの差 ÷3
  const hh = (bH===undefined || bH===null || isNaN(+bH)) ? 12 : (+bH); // 時刻不明は12時扱い
  const birthDate = new Date(bY, bM-1, bD, hh, 0, 0);

  const y = birthDate.getFullYear();
  const termsY = (window.SOLAR_TERMS||{})[y];
  if(!termsY) throw new Error("節気データ未登録:"+y);

  let target = null;

  if(fw){
    // 順行：次の節入り
    for(const t of termsY){
      const d = new Date(t.date);
      if(d > birthDate){ target = d; break; }
    }
    if(!target){
      const termsN = (window.SOLAR_TERMS||{})[y+1];
      if(!termsN) throw new Error("節気データ未登録:"+(y+1));
      target = new Date(termsN[0].date);
    }
  }else{
    // 逆行：前の節入り
    for(let i=termsY.length-1;i>=0;i--){
      const d = new Date(termsY[i].date);
      if(d < birthDate){ target = d; break; }
    }
    if(!target){
      const termsP = (window.SOLAR_TERMS||{})[y-1];
      if(!termsP) throw new Error("節気データ未登録:"+(y-1));
      target = new Date(termsP[termsP.length-1].date);
    }
  }

  const diffDays = Math.abs(target - birthDate) / (1000*60*60*24);
  const ritsun = diffDays / 3; // years (float)

  return Array.from({length:12},(_,i)=>{
    // 大運干支の巡りは「月柱」から：順行=進める / 逆行=戻す
    const idx = fw ? (p.month.i + i + 1) % 60 : ((p.month.i - i - 1) % 60 + 60) % 60;
    const sa = ritsun + i*10;
    const ea = ritsun + (i+1)*10;
    return {gz:JZ60[idx], g:JZ60[idx][0], s:JZ60[idx][1], sa, ea};
  });
}

  };
}

    '乾-坤':{rank:-2,label:'大凶'}, '坤-乾':{rank:-2,label:'大凶'}, '離-坎':{rank:-2,label:'大凶'}, '坎-離':{rank:-2,label:'大凶'},
  };
  const defaultGua={rank:0,label:'半吉'};

  let gousatsuDir = DIRS.find(d=>Number(ban[d])===5) || null;
  let ankenDir = gousatsuDir ? OPP[gousatsuDir] : null;
  let saihaDir = taisaiDir ? OPP[taisaiDir] : null;
  const honmeiDir = DIRS.find(d=>Number(ban[d])===Number(hks)) || null;
  const honmeiTekisatsuDir = honmeiDir ? OPP[honmeiDir] : null;

  function guaRank(dir){
    const up = DIR2TRI[dir];
    const low = STAR2TRI[Number(ban[dir])];
    if(!up || !low || low==='中') return defaultGua;
    const key = `${up}-${low}`;
    const base = GUAMAP[key] || defaultGua;
    const hex = hexagramOf(dir);
    return {...base, hex};
  }

  const res = {};
  for(const d of DIRS){
    const tags=[];

    // ❷ 十二支NG：月支への対冲は凶、日支への対冲は一発大凶
    const dz = EN2ZHI[d] || null;
    if(dz && monthZhi && ZHI_OPP[monthZhi]===dz && (mode==='month')) tags.push({t:'月破', sev:3});
    if(dz && dayZhi && ZHI_OPP[dayZhi]===dz && (mode==='day')) tags.push({t:'日破', sev:3});
    if(d===gousatsuDir) tags.push({t:'五黄殺', sev:3});
    if(d===ankenDir) tags.push({t:'暗剣殺', sev:3});
    if(d===saihaDir && (mode==='year')) tags.push({t:'歳破', sev:3});
    const gr=guaRank(d);
    if(gr.rank<=-1) tags.push({t:`六十四卦:${gr.label}`, sev:2});

    if(d===honmeiDir) tags.push({t:'本命殺', sev:1});
    if(d===honmeiTekisatsuDir) tags.push({t:'本命的殺', sev:1});

    tags.sort((a,b)=>b.sev-a.sev);
    const top = tags[0] || null;

    let cls='kikkyo-mid';
    if(top){
      if(top.sev===3) cls='kikkyo-worst';
      else if(top.sev===2) cls='kikkyo-bad';
      else cls='kikkyo-mild';
    }else{
      if(gr.rank===2) cls='kikkyo-best';
      else if(gr.rank===1) cls='kikkyo-good';
      else cls='kikkyo-mid';
    }

    res[d] = {dir:d, banStar:Number(ban[d]||0), tags, top, gua:gr, cls};
  }

  // buildKikkyoGrid は「adv(=res)」だけを受け取る既存仕様のまま
  return res;
}

  // ---------------------------------------------------------------------------
  // Safety net: contribution scoring helper (Safari iOS requires the function to
  // exist in the global script scope when referenced).
  // Returns a signed score where positive means "balance improves".
  // Accepts either:
  //  - number: returned as-is
  //  - object: { wood, fire, earth, metal, water } (any subset) summed.
  // This is intentionally conservative (won't throw).
  // ---------------------------------------------------------------------------
  function wxContributionScore(contrib){
    try{
      if(contrib == null) return 0;
      if(typeof contrib === 'number' && isFinite(contrib)) return contrib;
      if(typeof contrib === 'string'){
        const n = Number(contrib);
        return isFinite(n) ? n : 0;
      }
      if(typeof contrib === 'object'){
        const keys = ['wood','fire','earth','metal','water'];
        let s = 0;
        for(const k of keys){
          const v = contrib[k];
          if(typeof v === 'number' && isFinite(v)) s += v;
          else if(typeof v === 'string'){
            const n = Number(v);
            if(isFinite(n)) s += n;
          }
        }
        return s;
      }
      return 0;
    }catch(e){
      return 0;
    }
  }

  // Expose to window to avoid "Can't find variable" in some Safari execution paths
  try{ window.wxContributionScore = wxContributionScore; }catch(e){}


  // ---------------------------------------------------------------------------
  // 地支→五行寄与（年盤 / 月盤・日盤）
  // Safariのスコープ揺れ対策として window.zhi2wx も必ず生やす。
  // p: {year/month/day/hour:{g,s}} を想定
  // srcKey: 'year' | 'month' | 'day'
  // return: { wood, fire, earth, metal, water }
  // ---------------------------------------------------------------------------
  function zhi2wx(zhi, p, srcKey){
    try{
      if(!zhi) return {wood:0,fire:0,earth:0,metal:0,water:0};
      const mode = (srcKey==='year') ? 'year' : 'md';
      const base = {wood:0,fire:0,earth:0,metal:0,water:0};

      const hasKan = (arr)=>{
        const ks = [p?.year?.g, p?.month?.g, p?.day?.g, p?.hour?.g].filter(Boolean);
        return arr.some(k=>ks.includes(k));
      };
      const hasZhi = (arr)=>{
        const zs = [p?.year?.s, p?.month?.s, p?.day?.s, p?.hour?.s].filter(Boolean);
        return arr.some(z=>zs.includes(z));
      };
      const add = (k, v)=>{ base[k] = (base[k]||0) + v; };

      const Y = {
        '子': {water:3.5},
        '丑': {earth:1, metal:1, water:2},
        '寅': {fire:1, wood:2.5},
        '卯': {wood:3.5},
        '辰': {earth:1.5, wood:1, water:1},
        '巳': {fire:2.5},
        '午': {fire:3.5},
        '未': {fire:1.5, earth:1.5},
        '申': {metal:2.5, water:1},
        '酉': {metal:3.5},
        '戌': {fire:1, earth:2},
        '亥': {water:2.5},
      };
      const MD = {
        '子': {water:1.5},
        '丑': {earth:0.5, metal:0.5, water:1},
        '寅': {fire:0.5, wood:1},
        '卯': {wood:1.5},
        '辰': {earth:1, wood:0.5, water:0.5},
        '巳': {fire:1},
        '午': {fire:1.5},
        '未': {fire:0.5, earth:1},
        '申': {metal:1, water:0.5},
        '酉': {metal:1.5},
        '戌': {fire:0.5, earth:1},
        '亥': {water:1},
      };

      const t = (mode==='year') ? (Y[zhi]||{}) : (MD[zhi]||{});
      for(const [k,v] of Object.entries(t)) add(k, v);

      // conditional adds per user rules
      if(zhi==='巳'){
        const okKan = hasKan(['庚','辛']);
        const okZhi = hasZhi(['申','子','辰','酉']);
        if(okKan && okZhi){
          if(mode==='year'){ add('earth', 2.5); add('metal', 1); }
          else { add('earth', 1); add('metal', 0.5); }
        }
      }
      if(zhi==='午'){
        const okKan = hasKan(['戊','己']);
        const okZhi = hasZhi(['戌','辰','巳']);
        if(okKan || okZhi){
          if(mode==='year') add('earth', 3.5);
          else add('earth', 1.5);
        }
      }
      if(zhi==='未'){
        const okKan = hasKan(['甲','乙']);
        const okZhi = hasZhi(['亥','子','丑','申','辰','卯']);
        if(okKan && okZhi){
          if(mode==='year') add('wood', 1);
          else add('wood', 0.5);
        }
      }
      if(zhi==='戌'){
        const okKan = hasKan(['庚','辛']);
        const okZhi = hasZhi(['亥','子','丑','申','辰','酉']);
        if(okKan && okZhi){
          if(mode==='year') add('metal', 1);
          else add('metal', 0.5);
        }
      }
      if(zhi==='亥'){
        const okKan = hasKan(['甲','乙']);
        const okZhi = hasZhi(['巳','午','未','寅','戌','卯']);
        if(okKan && okZhi){
          if(mode==='year') add('wood', 1);
          else add('wood', 0.5);
        }
      }

      return base;
    }catch(e){
      return {wood:0,fire:0,earth:0,metal:0,water:0};
    }
  }
  try{ window.zhi2wx = zhi2wx; }catch(e){}



// 方向ラベル（表示用）：東西を先に出す（例：南東→東南）
const DIR_LABEL_MAP = {
  '南東':'東南','北東':'東北','南西':'西南','北西':'西北'
};
function dispDir(dir){
  return DIR_LABEL_MAP[dir] || dir;
}

function normalizeHoui(res, p){
  const EN2JP={N:'北',NE:'北東',E:'東',SE:'南東',S:'南',SW:'南西',W:'西',NW:'北西'};
  const DIR_LABEL={ '南東':'東南','南西':'西南','北東':'東北','北西':'西北' };
  const dispDir=(d)=>DIR_LABEL[d]||d;
  // 記号↔スコア
  const S2SYM   = (s) => (s>=2?'⭐︎':s>=1?'◎':s>=0?'○':s>=-1?'▲':'✖︎');
  const S2CODE  = (s) => (s>=2?'dai-kichi':s>=1?'kichi':s>=0?'han-kichi':s>=-1?'kyo':'daikyo');
  const S2LABEL = (s) => (s>=2?'大吉':s>=1?'吉':s>=0?'半吉':s>=-1?'凶':'大凶');

  // 十干→五行
  const KAN_WX = { '甲':'木','乙':'木','丙':'火','丁':'火','戊':'土','己':'土','庚':'金','辛':'金','壬':'水','癸':'水' };
  // 五行の相剋（AがBを剋す）
  const WX_KOKU = { '木':'土','土':'水','水':'火','火':'金','金':'木' };
  const isKokuWx = (aw, bw) => {
    if(!aw || !bw) return false;
    return WX_KOKU[aw] === bw;
  };

  const srcKey = (typeof curHouiMode==='string' && (curHouiMode==='year'||curHouiMode==='month'||curHouiMode==='day')) ? curHouiMode : ((p && p._srcKey) ? p._srcKey : "year");
  const monthZhi = (p && p.natalMonthZhi) ? p.natalMonthZhi : ((p && p.month && p.month.s) ? p.month.s : null);
  const dayZhi   = (p && p.day   && p.day.s)   ? p.day.s   : null;
  const monthKan = (p && p.month && p.month.g) ? p.month.g : null;
  const dayKan   = (p && p.day   && p.day.g)   ? p.day.g   : null;

  const out={};
  for(const [en,v] of Object.entries(res||{})){
    const dir=EN2JP[en]||en;
    const tagTexts=(v.tags||[]).map(x=>x.t);
    const starNum = v.banStar||v.star||0;
    const STAR_NAME = {1:'一白',2:'二黒',3:'三碧',4:'四緑',5:'五黄',6:'六白',7:'七赤',8:'八白',9:'九紫'};
    // 干支（九宮干支）は「中宮の干支」を基準に、九宮順で +0..+8 ずらす（盤タブと同一ロジック）
    const OFFS={'中':0,'北西':1,'西':2,'北東':3,'南':4,'北':5,'南西':6,'東':7,'南東':8};
    const centerJZ = (srcKey==='year') ? (p && p.yearJZ) : (srcKey==='month') ? (p && p.monthJZ) : (p && p.dayJZ);
    const idx0 = (centerJZ && typeof centerJZ==='string' && Array.isArray(window.JZ60)) ? window.JZ60.indexOf(centerJZ) : -1;
    const kanshi = (idx0>=0 && OFFS[dir]!=null) ? window.JZ60[(idx0 + OFFS[dir]) % 60] : '';
    const dirKan = kanshi ? kanshi[0] : '';
    const dirZhi = kanshi ? kanshi[1] : '';
    // ❶ 九星（凶殺）+ 六十四卦
    const guaScore = (v.gua && typeof v.gua.rank==='number') ? v.gua.rank : 0; // -2..+2

    let starScore = 0;
    let forceNG = false;
    const tagsObj = v.tags || [];
    if(tagTexts.includes('暗剣殺')) starScore -= 3;
    if(tagTexts.includes('五黄殺')) starScore -= 3;
    if(tagTexts.includes('歳破'))   starScore -= 2;
    // 破（歳破・月破・日破）は一発❌
    if(tagTexts.includes('歳破') || tagTexts.includes('月破') || tagTexts.includes('日破')) forceNG = true;

    // ❷ 十干・十二支（五行バランス補完）
    // 方位別の干支評価は、画面に表示している九宮干支（dirKan/dirZhi）と必ず一致させる
    // ※calcHouiAdv側の v.kan/v.zhi は「方位対応の固定干支(N=子,S=午...)」として使っているため、ここでは採用しない
    const k = dirKan;
    const z = dirZhi;

    let kanScore = 0;
    if(k){
      // 十干は「表示している九宮干支の天干(k)」のみを評価対象にする。
      // ※日干/月干との相剋ペナルティを入れると、月盤・日盤の境界で判定がブレやすく
      //   参照盤（一般的な方位盤）とズレやすいので採用しない。
      const kWx = KAN_WX[k];
      const contrib={'木':0,'火':0,'土':0,'金':0,'水':0};
      if(kWx) contrib[kWx] = (window.TENKAN_VAL && window.TENKAN_VAL[k])
        ? window.TENKAN_VAL[k]
        : (k==='甲'||k==='丙'||k==='戊'||k==='庚'||k==='壬'?1:0.5);
      kanScore += wxContributionScore(contrib);
    }

    let zhiScore = 0;
    if(z){
      const contrib = zhi2wx(z, srcKey);
      const basisZhi = (srcKey==='year' && typeof yearZhi!=='undefined') ? yearZhi : (srcKey==='month' ? monthZhi : dayZhi);
      zhiScore += wxContributionScore(contrib);
      if(ZHI_OPP[monthZhi] === z){ forceNG = true; if(!tagTexts.includes("月柱対冲")){ tagTexts.push("月柱対冲"); tagsObj.push({t:"月柱対冲"}); } }
      // 月盤の南北（子午）対冲は強制NG
      if(((en==='N' && z==='午') || (en==='S' && z==='子'))){
        // 南北の子午が来るのは「一発❌」扱い（総合も内訳の十二支も強制NG）
        forceNG = true;
        zhiScore = -9;
        if(!tagTexts.includes('子午対冲')){ tagTexts.push('子午対冲'); tagsObj.push({t:'子午対冲'}); }
      }

      if(ZHI_OPP[basisZhi] === z) zhiScore -= 4;
    }

　　// ❸ 定位（全方位）：定位置は一段強まる
　　　　const fixedStarBonus = (STAR_FIXED && STAR_FIXED[en]===starNum) ? 1 : 0;
　　　　const fixedKanBonus  = (KAN_FIXED  && KAN_FIXED[en]===k)       ? 1 : 0;
　　　　const fixedZhiBonus  = (ZHI_FIXED  && ZHI_FIXED[en]===z)       ? 1 : 0;

　　　　const fixedBonus = fixedStarBonus + fixedKanBonus + fixedZhiBonus;

    // 定位対冲（北・南のみ採用）
    if(STAR_FIXED_OPP && STAR_FIXED_OPP[en]===starNum) starScore -= 3;

    let integratedScore = guaScore + starScore + kanScore + zhiScore + fixedBonus;

    // ❹ 破（⽇破・⽉破）: 該当方位は -2（表示タグも付与）
    const ha = (window && window.getHaPenalty && window.TPY) ? window.getHaPenalty(dir, window.TPY) : {penalty:0,labels:[]};
    integratedScore += (ha.penalty||0);
    if(Array.isArray(ha.labels) && ha.labels.length){
      ha.labels.forEach(l=>{
        tagTexts.push(l);
        tagsObj.push({t:l});
      });
    }
    let s2;
    if(integratedScore>=3) s2=2;
    else if(integratedScore>=1) s2=1;
    else if(integratedScore<=-3) s2=-2;
    else if(integratedScore<=-1) s2=-1;
    else s2=0;
    if(forceNG) s2 = -2;
　　// ---- 大吉⭐︎（緑）への昇格判定：九星>=○ & 十干>=○ & 十二支>=○ かつ いずれかが◎or⭐︎ ----
    const scoreToS2 = (sc) => {
      if(sc >= 3) return 2;
      if(sc >= 1) return 1;
      if(sc <= -3) return -2;
      if(sc <= -1) return -1;
      return 0;
    };
    const kuseiComponentScore   = guaScore + starScore + fixedStarBonus; // 九星（凶殺）+卦+定位
    const tenkanComponentScore  = kanScore + fixedKanBonus;              // 十干（補完）
    const junishiComponentScore = zhiScore + fixedZhiBonus;              // 十二支（補完）

    // 各構成要素を -2..+2 に正規化（表示と同じ閾値）
    let kuseiS2   = scoreToS2(kuseiComponentScore);
    let tenkanS2  = scoreToS2(tenkanComponentScore);
    let junishiS2 = scoreToS2(junishiComponentScore);
    if(forceNG) junishiS2 = -2;

    // 昇格条件（微調整）
// (九星>=◎ & 十干>=◎ & 十二支>=○)
// or (九星>=○ & 十干>=◎ & 十二支>=◎)
// or (九星>=◎ & 十干>=○ & 十二支>=◎)
const isDaikichi =
      (kuseiS2>=1 && tenkanS2>=1 && junishiS2>=0)
   || (kuseiS2>=0 && tenkanS2>=1 && junishiS2>=1)
   || (kuseiS2>=1 && tenkanS2>=0 && junishiS2>=1);

    if(isDaikichi){
      // 「総合」を強制的に最上位へ（大吉⭐︎＝緑）
      s2 = 2;
    }
    if(forceNG) s2 = -2;
out[dir]={
      dir,
      star: starNum,
      starName: STAR_NAME[starNum] || String(starNum||''),
      kanshi,
      nm: v.nm||'',
      level: S2LABEL(s2),
      mark:  S2SYM(s2),
      levelCode: S2CODE(s2),
      // 個別記号
      markStar: S2SYM(kuseiS2),
      markKan:  S2SYM(tenkanS2),
      markZhi:  S2SYM(junishiS2),
      iss: tagTexts.filter(t=>t==='本命殺' || t==='本命的殺'),
      gua: (v.gua && v.gua.label) ? v.gua.label : '—',
      guaFull: (v.gua && v.gua.hex && v.gua.hex.full) ? v.gua.hex.full : '—'
    };
    const add = (tagTexts||[]).filter(t=>t!=='本命殺' && t!=='本命的殺');
    if(add.length){
      out[dir].iss = (out[dir].iss||[]).concat(add);
    }
  }
  return out;
}

function buildKikkyoGrid(adv){
  const order = [
    ["北西","北","北東"],
    ["西","中","東"],
    ["南西","南","南東"]
  ];
  const cellHtml = (dir) => {
    if(dir==="中"){
      return `<div class="kcell center"><div class="k-dir">中央</div></div>`;
    }
    const c = adv?.[dir];
    if(!c){
      return `<div class="kcell"><div class="k-dir">${dispDir(dir)}</div></div>`;
    }
    const cls = `kcell level-${c.levelCode||"han-kichi"}`;
    const tags0 = ((Array.isArray(c.iss)?c.iss:(c.iss?[c.iss]:[]))).map(x=>`<span class="k-tag">${x}</span>`).join("");
    const guaTag = (c.guaFull && c.guaFull!=="—") ? `<span class="k-tag">六十四卦:${c.guaFull}</span>` : "";
    const tags = guaTag + tags0;
    const mini = `<div class="k-mini">`
      + `<div><span>九星</span>${c.markStar||'○'}</div>`
      + `<div><span>十干</span>${c.markKan||'○'}</div>`
      + `<div><span>十二支</span>${c.markZhi||'○'}</div>`
      + `</div>`;
    return `<div class="${cls}">
      <div class="k-dir">${dispDir(dir)}</div>
      <div class="k-level">${(c.mark||"")}${c.level||"—"}</div>
      ${mini}
      <div class="k-star"><span>九星</span>${c.starName||c.star}　${c.nm||""}</div>
      <div class="k-star"><span>干支</span>${c.kanshi||""}</div>
      <div class="k-tags">${tags}</div>
    </div>`;
  };
    const legend = `
    <div class="kikkyo-legend">
      <span class="kikkyo-chip"><span class="kikkyo-dot" style="background:#22c55e"></span>⭐︎ 大吉</span>
      <span class="kikkyo-chip"><span class="kikkyo-dot" style="background:#3b82f6"></span>◎ 吉</span>
      <span class="kikkyo-chip"><span class="kikkyo-dot" style="background:#eab308"></span>○ 半吉</span>
      <span class="kikkyo-chip"><span class="kikkyo-dot" style="background:#78350f"></span>▲ 凶</span>
      <span class="kikkyo-chip"><span class="kikkyo-dot" style="background:#ef4444"></span>✖︎ 大凶</span>
    </div>`;
  let rows = order.map(r=>r.map(cellHtml).join("")).join("");
  return `<div class="kikkyo-wrap">${legend}<div class="kikkyo-grid">${rows}</div></div>`;
}


const WC={"木":"#4ade80","火":"#f87171","土":"#fbbf24","金":"#c0c0d0","水":"#60a5fa"};
const W5=["木","火","土","金","水"];
const GRP5=["比劫","食傷","財星","官星","印星"];
function grpWxMap(nwx){const ord=orderedWX(nwx);const m={};GRP5.forEach((g,i)=>{m[g]=ord[i];});return m;}

// --- 九星：年家・月家・日家（簡易実装） ---
// 年家九星は cYK(year) を使用（立春切替は上位仕様で拡張可能）
// 月家九星：こよみのページ準拠の起点（1863年11月=一白）から陰遁で算出（※節切り精密化は後日）
// 日家九星：冬至/夏至に最も近い甲子日で転遁（陽遁=1→…、陰遁=9→…）で算出
function cMK(y,m,d,hh=12,ignoreTime=false){
  // 月家九星（節月ベース）：鑑定日(y,m,d)を節切りで「寅月=1..丑月=12」に変換し、
  // 1863/11（節月）を起点に月数を数えて陰遁で算出。
  // JST正午扱い（盤/吉凶方位は0時日付基準だが、節切り計算は時刻に依存するため固定時刻で評価）
  const birthUTC=_dateUTCfromJST(y,m,d,hh);
  const lichun=lichunUTC(y);
  const ly=(birthUTC < lichun) ? y-1 : y;           // 節年（年柱の年）
  const lm=solarMonthNoBySekki(y,m,d,hh,ignoreTime);            // 1..12 (寅=1)
  const serial = ly*12 + (lm-1);

  // base: 1863/11/15 (JST) の節月 serial を計算して合わせる
  const baseY=1863, baseM=11, baseD=15;
  const baseUTC=_dateUTCfromJST(baseY,baseM,baseD,12);
  const baseLichun=lichunUTC(baseY);
  const baseLY=(baseUTC < baseLichun) ? baseY-1 : baseY;
  const baseLM=solarMonthNoBySekki(baseY,baseM,baseD,12);
  const baseSerial = baseLY*12 + (baseLM-1);

  const off = serial - baseSerial;     // months from base
  const r = (((-off)%9)+9)%9;          // 0..8
  return ((r+1)%9)+1;                          // 1..9
}
function dayIndex60(y,m,d){
  const a=Math.floor((14-m)/12),yy=y+4800-a,mmm=m+12*a-3;
  return ((d+Math.floor((153*mmm+2)/5)+365*yy+Math.floor(yy/4)-Math.floor(yy/100)+Math.floor(yy/400)-32045+49)%60+60)%60;
}
function nearestKoushi(y,m,d){
  const t=new Date(Date.UTC(y,m-1,d));
  let best=null;
  for(let delta=-40;delta<=40;delta++){
    const dt=new Date(t.getTime()+delta*86400000);
    const yy=dt.getUTCFullYear(),mm=dt.getUTCMonth()+1,dd=dt.getUTCDate();
    if(dayIndex60(yy,mm,dd)===0){
      const dist=Math.abs(delta);
      if(best===null||dist<best.dist)best={dist,yy,mm,dd,dt};
    }
  }
  return best?best.dt:new Date(Date.UTC(y,m-1,d));
}
function cDK(y,m,d){
  const dt=new Date(Date.UTC(y,m-1,d));
  const yCur=dt.getUTCFullYear();
  const winPrev=nearestKoushi(yCur-1,12,21);
  const sumCur=nearestKoushi(yCur,6,21);
  const winCur=nearestKoushi(yCur,12,21);

  let start, startStar, step;
  if(dt>=winPrev && dt<sumCur){ start=winPrev; startStar=1; step=+1; }
  else if(dt>=sumCur && dt<winCur){ start=sumCur; startStar=9; step=-1; }
  else if(dt>=winCur){ start=winCur; startStar=1; step=+1; }
  else { start=winPrev; startStar=1; step=+1; }

  const diff=Math.round((dt.getTime()-start.getTime())/86400000);
  return (((startStar-1 + step*diff)%9)+9)%9 + 1;
}

function buildDDText(ng, totalWx){
  const meta=DD_META[ng] || {name:"",wx:"",core:""};
  const v=(totalWx && meta.wx) ? totalWx[meta.wx] : null;
  const lv=_wxLevelLabel(v);
  let add="";

  if(meta.wx==="土"){
    if(ng==="己"){
      add = (lv.lv==="多め")
        ? "土が厚く、耕し甲斐のある『肥えた畑』。人も企画も、育つ前提で扱うほど結果が出ます。"
        : (lv.lv==="少なめ")
          ? "土が薄く、栄養が抜けやすい『痩せた畑』。まずは睡眠・食事・習慣の土台づくりが最優先。"
          : "耕せば育つ『扱いやすい畑』。整えるほど、成果が収穫として返ってきます。";
    }else{
      add = (lv.lv==="多め")
        ? "土が厚く、崩れにくい『大地の安定』。守りは強いので、次は火（情熱）を入れると伸びます。"
        : (lv.lv==="少なめ")
          ? "土台が薄く、踏ん張りが利きにくい時期。小さなルーティンで『足元』を作ると急に強くなります。"
          : "大地の安定と柔らかさのバランスが良く、任されるほど力が出ます。";
    }
  }else if(meta.wx==="水"){
    add = (lv.lv==="多め")
      ? "水量が多く、情報も感情も『溢れやすい』。取捨選択と境界線で、才能が澄みます。"
      : (lv.lv==="少なめ")
        ? "水が少なく、乾きやすい。安心できる人・場所・睡眠で潤すほど、発想と回復が戻ります。"
        : "水の巡りが良く、必要な時に必要な流れを掴めます。";
  }else if(meta.wx==="木"){
    add = (lv.lv==="多め")
      ? "木が茂りやすく、理想や伸びしろが増える。『選択と集中』で枝を剪定すると最速で伸びます。"
      : (lv.lv==="少なめ")
        ? "木が育ちにくく、方向性が揺れやすい。学び・師匠・計画で根を張るほど強くなります。"
        : "木が素直に伸びる状態。成長テーマを一つ決めると一気に伸びます。";
  }else if(meta.wx==="火"){
    add = (lv.lv==="多め")
      ? "火力が強く、気分も行動も上がりやすい。燃やしすぎ防止に『休息と水分』をセットで。"
      : (lv.lv==="少なめ")
        ? "火が弱く、やる気スイッチが入りづらい。映画・音楽・恋・運動など『陽の喜び』で点火が鍵。"
        : "火は安定。必要な場面でしっかり燃えて、周りも温められます。";
  }else if(meta.wx==="金"){
    add = (lv.lv==="多め")
      ? "金が強く、判断が鋭い。尖りが出たら『柔らかさ（木・水）』を混ぜると魅力が増します。"
      : (lv.lv==="少なめ")
        ? "金が弱く、決断が先延ばしになりやすい。締切・ルール・型で鍛えると急に強くなります。"
        : "金は安定。精度と決断のバランスが良く、信頼されやすいです。";
  }

  let top1="", top2="", low1="", low2="";
  let sumLine="", landscapeText="", lowHintText="", chosetsuText="";
  try{
    if(totalWx){
      const sorted=Object.entries(totalWx).sort((a,b)=>(b[1]||0)-(a[1]||0));
      top1=sorted[0]?.[0]||""; top2=sorted[1]?.[0]||"";
      low1=sorted[sorted.length-1]?.[0]||""; low2=sorted[sorted.length-2]?.[0]||"";
      if(top1 && top2){
        sumLine=`命式の五行バランスを見ると、強い順に「${top1}→${top2}」が軸をなしています。`;
      }
      const ls = _heartLandscape(ng, meta, top1, top2, low1, lv);
      landscapeText = ls.landscape;
      lowHintText   = ls.lowHint;
      chosetsuText  = _chosetsuDirection(ng, low1, low2, totalWx);
    }
  }catch(e){}

  const core_block =
    `■ あなたの核（日主：${meta.name}・${ng}${meta.wx}）\n`+
    `${meta.core}\n`+
    `この「あなたとは何者か」は、命式の要素が多くても少なくても変わりません。変わるのは『状態』であり、環境と行動で整えることができます。\n`;

  const balance_block =
    `■ 現在の命式の心象風景\n`+
    (sumLine ? `${sumLine}\n` : ``)+
    (landscapeText ? `${landscapeText}\n` : ``)+
    `いまのあなたの${meta.wx}は「${lv.lv}」傾向。${add}（目安：${lv.hint}）\n`+
    (lowHintText ? `${lowHintText}\n` : ``);

  const chosetsu_block = chosetsuText
    ? `■ 運命の調律の方向性\n${chosetsuText}`
    : "";

  return core_block + `\n` + balance_block + (chosetsu_block ? `\n` + chosetsu_block : "");
}

function addDaysUTC(y,m,d,delta){
  const dt=new Date(Date.UTC(y,m-1,d));
  dt.setUTCDate(dt.getUTCDate()+delta);
  return {y:dt.getUTCFullYear(), m:dt.getUTCMonth()+1, d:dt.getUTCDate()};
}
function addMonthsUTC(y,m,d,delta){
  const dt=new Date(Date.UTC(y,m-1,d));
  const origDay=dt.getUTCDate();
  dt.setUTCMonth(dt.getUTCMonth()+delta);
  // clamp day if month shorter
  const lastDay=new Date(Date.UTC(dt.getUTCFullYear(), dt.getUTCMonth()+1, 0)).getUTCDate();
  dt.setUTCDate(Math.min(origDay,lastDay));
  return {y:dt.getUTCFullYear(), m:dt.getUTCMonth()+1, d:dt.getUTCDate()};
}

    const seen = new Set();

      Array.from(n.querySelectorAll('h3, .ttl, strong')).forEach(el=>{

    for(const c of nodes){

function analyzeBalance(total){
  // total can be {wood,fire,earth,metal,water} OR {"木","火","土","金","水"}
  const get = (kEn) => {
    if(!total) return 0;
    if(typeof total[kEn] === "number") return total[kEn];
    const jaMap = {wood:"木", fire:"火", earth:"土", metal:"金", water:"水"};
    const kJa = jaMap[kEn];
    const v = total[kJa];
    return (typeof v === "number") ? v : 0;
  };

  const wxKeys = ["wood","fire","earth","metal","water"];
  const vals = wxKeys.map(get);
  const sum = vals.reduce((a,b)=>a+b,0) || 1;

  // max/min (stable even if all 0)
  let maxI = 0, minI = 0;
  for(let i=1;i<vals.length;i++){
    if(vals[i] > vals[maxI]) maxI = i;
    if(vals[i] < vals[minI]) minI = i;
  }
  const domKey = wxKeys[maxI];
  const weakKey = wxKeys[minI];

  // balance type
  const max = vals[maxI];
  let type = "balanced";
  const maxPct = max/sum;
  if(maxPct >= 0.52) type = "oneStrong";
  else if(maxPct >= 0.43) type = "twoStrong";
  else type = "balanced";

  const pct = Object.fromEntries(wxKeys.map((k,i)=>[k, Math.round(vals[i]/sum*100)]));

  return {pct, domKey, weakKey, type, vals, sum};
}

    let relType=''; let relMsg='';

    // five element totals（現在表示中の歳運に連動）

    // --- Radar similarity & complement (lightweight, philosophy-safe) ---
    const vecA=[scA.木||0, scA.火||0, scA.土||0, scA.金||0, scA.水||0];
    const vecB=[scB.木||0, scB.火||0, scB.土||0, scB.金||0, scB.水||0];

    const _dot=(x,y)=>x.reduce((s,v,i)=>s+v*(y[i]||0),0);
    const _norm=(x)=>Math.sqrt(_dot(x,x))||1;
    const cosineSim=()=>{ const na=_norm(vecA), nb=_norm(vecB); return Math.max(0,Math.min(1,_dot(vecA,vecB)/(na*nb))); };

    const areaSim=()=>{
      const nums = [...vecA, ...vecB].map(x=>Number(x)).filter(x=>Number.isFinite(x));
      const maxV = Math.max(1, ...(nums.length?nums:[0]));
      const normArr = (arr)=>arr.map(v=>Math.max(0,(Number(v)||0))/maxV);
      const a = normArr(vecA), b = normArr(vecB);
      const ang0 = -Math.PI/2, step = 2*Math.PI/5;
      const polyArea = (r)=>{
        const pts = r.map((rv,i)=>[rv*Math.cos(ang0+i*step), rv*Math.sin(ang0+i*step)]);
        let s=0;
        for(let i=0;i<pts.length;i++){
          const [x1,y1]=pts[i], [x2,y2]=pts[(i+1)%pts.length];
          s += x1*y2 - x2*y1;
        }
        return Math.abs(s)/2;
      };
      const inter = a.map((v,i)=>Math.min(v,b[i]));
      const uni   = a.map((v,i)=>Math.max(v,b[i]));
      const ai = polyArea(inter), au = polyArea(uni);
      if(!isFinite(ai) || !isFinite(au) || au<=0) return 0;
      return Math.max(0, Math.min(1, ai/au));
    };


    const interactionScores=()=>{
      const mean=(x)=>x.reduce((s,v)=>s+v,0)/5;
      const ma=mean(vecA), mb=mean(vecB);
      let comp=0, amp=0;
      for(let i=0;i<5;i++){
        const dA=vecA[i]-ma, dB=vecB[i]-mb;
        const prod=dA*dB;
        if(prod<0) comp += Math.abs(prod);
        if(prod>0) amp  += Math.abs(prod);
      }
      // normalize roughly to 0..1 range for stable thresholds
      const denom=(comp+amp)||1;
      return {comp:comp/denom, amp:amp/denom};
    };

    const catInfo = compatCat ? SYUKU_CAT_INFO[compatCat] : null;

    if(aSyuku && bSyuku) {
      const aRank = (aSyuku) ? (SYUKU_ORDER.indexOf(aSyuku)+1) : '?';

function _severeImbalanceFromFive(scB){
  try{
    if(!scB) return false;
    const vals=[scB['木']||0, scB['火']||0, scB['土']||0, scB['金']||0, scB['水']||0];
    const total=vals.reduce((a,b)=>a+b,0);
    if(!total) return false;
    const maxV=Math.max(...vals);
    const minV=Math.min(...vals);
    // 判定は「極端に偏っている」ケースだけ拾う（普段は術不要を優先）。
    if(minV===0 && maxV>=total*0.55) return true;
    if((maxV-minV) >= total*0.6) return true;
    if(minV>0 && (maxV/minV) >= 4) return true;
    return false;
  }catch(e){ return false; }
}

const ZHI_OPPOSITE = {
  '子':'午','午':'子',
  '丑':'未','未':'丑',
  '寅':'申','申':'寅',
  '卯':'酉','酉':'卯',

};

const ZHI_TO_DIR = {
  '子':'北',
  '丑':'北東','寅':'北東',
  '卯':'東',
  '辰':'南東','巳':'南東',
  '午':'南',

window.getHaPenalty = function(dir, tPY){
  // 表示ラベルは「東南/西北」など東西を先にする仕様もある。
  // 十二支→方位の判定は従来の「南東/北西」表記で行うため、ここで正規化する。
  const normDir = (d)=>{
    if(!d) return d;
    if(d === '東南') return '南東';
    if(d === '東北') return '北東';
    if(d === '西南') return '南西';
    if(d === '西北') return '北西';
    return d;
  };
  dir = normDir(dir);
  let penalty = 0;
  let labels = [];
  try{
    const dayOpp = ZHI_OPPOSITE[tPY.day.s];
    const monthOpp = ZHI_OPPOSITE[tPY.month.s];

    if(dir === ZHI_TO_DIR[dayOpp]){
      penalty -= 2;
      labels.push('日破');
    }
    if(dir === ZHI_TO_DIR[monthOpp]){
      penalty -= 2;
      labels.push('月破');
    }
  }catch(e){}
  return {penalty, labels, tags: labels};
};

/* ===== ◀︎▶︎ 安全連動（既存onclickを上書きしない） ===== */
(function(){

function safeAttach(){
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  if(!prevBtn || !nextBtn) return;

  const originalPrev = prevBtn.onclick;
  const originalNext = nextBtn.onclick;

  window.currentMode = window.currentMode || 'year';
  window.curBanMode = window.curBanMode || 'year';

  prevBtn.onclick = function(){
    if(window.currentMode==='month'){
      window.curTM--;
      if(window.curTM<1){ window.curTM=12; window.curTY--; }
    }else if(window.currentMode==='day'){
      const d=new Date(window.curTY,window.curTM-1,window.curTD);
      d.setDate(d.getDate()-1);
      window.curTY=d.getFullYear();
      window.curTM=d.getMonth()+1;
      window.curTD=d.getDate();
    }else{
      if(originalPrev) return originalPrev();
    }
    if(typeof render==="function") render();
  };

  nextBtn.onclick = function(){
    if(window.currentMode==='month'){
      window.curTM++;
      if(window.curTM>12){ window.curTM=1; window.curTY++; }
    }else if(window.currentMode==='day'){
      const d=new Date(window.curTY,window.curTM-1,window.curTD);
      d.setDate(d.getDate()+1);
      window.curTY=d.getFullYear();
      window.curTM=d.getMonth()+1;
      window.curTD=d.getDate();
    }else{
      if(originalNext) return originalNext();
    }
    if(typeof render==="function") render();
  };
}

document.addEventListener("DOMContentLoaded", safeAttach);

})();

  document.addEventListener('touchend', function(e){
    const t = e.target && e.target.closest ? e.target.closest('button,[role="button"],a') : null;
    if(t && t.tagName==='BUTTON'){
      // let native click fire; but if not, dispatch one.
